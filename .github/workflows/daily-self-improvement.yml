name: Daily Self-Improvement

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: azalyst-crypto-improve
  cancel-in-progress: false

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests pandas scikit-learn xgboost joblib rich

      - name: Run self-improvement engine
        env:
          NIM_API_KEY: ${{ secrets.NIM_API_KEY }}
        run: python self_improve.py

      - name: Commit improvements if any
        run: |
          git config --global user.name "azalyst-improver"
          git config --global user.email "improver@azalyst.ai"
          git add src/trainer.py src/features.py src/signal_engines.py \
                  src/signal_fusion.py src/pipeline.py src/collector.py \
                  improvement_log.jsonl || true
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "improve: autonomous code update $(date -u '+%Y-%m-%d')"
          git push origin main || echo "Nothing to push"
