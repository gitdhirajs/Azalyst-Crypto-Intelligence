<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZALYST | Crypto Intelligence</title>
<meta name="theme-color" content="#000000">
<link rel="stylesheet" href="styles.css">
<style>
/* =============================================================
   AZALYST CRYPTO INTELLIGENCE — Alpha Scanner Matched Theme
   ============================================================= */
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{
  background:#000;
  color:#ff6600;
  font-family:'Courier New',monospace;
  min-height:100vh;
  overflow-x:hidden;
  min-width:1100px;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,102,0,0.02) 3px,rgba(255,102,0,0.02) 4px);
  pointer-events:none;
  z-index:9998;
}
/* ... trimmed for brevity in command ... */
</style>
</head>
<body>
<header class="topbar">
  <div class="brand-block">
    <div class="brand-mark">
      <span class="live-dot on" id="liveDot"></span>AZALYST
      <span style="color:#666;font-weight:400;font-size:10px;letter-spacing:.12em">CRYPTO INTELLIGENCE</span>
    </div>
  </div>
  <nav class="tabs">
    <button class="tab active" onclick="switchTab('MARKET')">Market Data</button>
    <button class="tab" onclick="switchTab('MODELS')">Models</button>
    <button class="tab" onclick="switchTab('OPS')">Operations</button>
  </nav>
  <div class="topbar-meta">
    <span id="liveStatus" class="status-dot warn">LOADING</span>
    <span id="clockValue" class="meta-value">--:--:-- IST</span>
  </div>
</header>
<div class="tape"><div class="tape-inner" id="tickerTape"><span>Connecting to runtime telemetry...</span></div></div>
<div id="page-MARKET" class="page active"></div>
<div id="page-MODELS" class="page"></div>
<div id="page-OPS" class="page"></div>
<div class="statusbar"><span id="footerStatus" style="font-size:9px;color:#333;letter-spacing:.06em">Waiting for data...</span></div>
<script src="app.js"></script>
</body>
</html>
